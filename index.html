<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Business Development Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #020617;
            --color-bg-surface: #1e293b;
            --color-bg-muted: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-text-accent: #38bdf8;
            --color-primary: #38bdf8;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-purple: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            padding: 2rem;
            line-height: 1.6;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        .sync-status {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--color-success);
            border-radius: 6px;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--color-success);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--color-bg-surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.1);
            transition: transform 0.2s, border-color 0.2s;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.875rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        .metric-subtext {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: var(--color-bg-surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: var(--color-text-primary);
            letter-spacing: -0.25px;
        }

        .filters {
            background: var(--color-bg-surface);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        select, input {
            background: var(--color-bg-muted);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--color-text-primary);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            min-width: 150px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .table-container {
            background: var(--color-bg-surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--color-bg-muted);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.75px;
        }

        td {
            padding: 1rem;
            border-top: 1px solid rgba(56, 189, 248, 0.1);
            font-size: 0.9rem;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        td strong {
            transition: font-size 0.2s ease;
        }

        td strong:hover {
            font-size: 1.1rem;
        }

        .edit-btn {
            background: var(--color-primary);
            color: var(--color-text-primary);
            border: none;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        .edit-btn:hover {
            background: var(--color-primary);
            opacity: 0.85;
        }

        .delete-btn {
            background: var(--color-danger);
            color: var(--color-text-primary);
            border: none;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
            margin-left: 0.5rem;
        }

        .delete-btn:hover {
            background: var(--color-danger);
            opacity: 0.85;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--color-bg-surface);
            padding: 2rem;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--color-primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--color-text-secondary);
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--color-text-primary);
        }

        .form-field {
            margin-bottom: 1rem;
        }

        .form-field label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .form-field input,
        .form-field select {
            width: 100%;
            background: var(--color-bg-muted);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--color-text-primary);
            padding: 0.65rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: 'Barlow', sans-serif;
        }

        .form-field input:focus,
        .form-field select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .save-btn {
            flex: 1;
            background: var(--color-success);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: opacity 0.2s;
            font-weight: 500;
        }

        .save-btn:hover {
            opacity: 0.85;
        }

        .cancel-btn {
            flex: 1;
            background: var(--color-bg-muted);
            color: var(--color-text-primary);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        .cancel-btn:hover {
            background: var(--color-bg-elevated);
        }

        .add-deal-btn {
            background: var(--color-success);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: opacity 0.2s;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .add-deal-btn:hover {
            opacity: 0.85;
        }

        .status-badge {
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
            letter-spacing: 0.25px;
        }

        .status-identified {
            background: rgba(148, 163, 184, 0.2);
            color: var(--color-text-muted);
        }

        .status-submitted {
            background: rgba(56, 189, 248, 0.2);
            color: var(--color-primary);
        }

        .status-negotiation {
            background: rgba(245, 158, 11, 0.2);
            color: var(--color-warning);
        }

        .status-won {
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
        }

        .status-lost {
            background: rgba(239, 68, 68, 0.2);
            color: var(--color-danger);
        }

        .probability-high {
            color: var(--color-success);
            font-weight: 600;
        }

        .probability-medium {
            color: var(--color-warning);
            font-weight: 600;
        }

        .probability-low {
            color: var(--color-text-muted);
            font-weight: 600;
        }

        .vertical-tag {
            background: rgba(168, 85, 247, 0.15);
            color: var(--color-purple);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bar-label {
            min-width: 100px;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .bar-container {
            flex: 1;
            height: 28px;
            background: var(--color-bg-muted);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), rgba(56, 189, 248, 0.6));
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 0.5rem;
        }
